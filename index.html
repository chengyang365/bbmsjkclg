<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新廊华小教学资源库 (Pusat Sumber SJK(C) Ladang Grisek)</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Noto Sans SC) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f3f4f6;
            touch-action: manipulation;
        }
        /* Hide scrollbar for cleaner IFPD look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* Custom scrollbar hiding for horizontal lists */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .card-hoverable {
            transition: all 0.2s ease-in-out;
        }
        .card-hoverable:active {
            transform: scale(0.98);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 内置 SVG 图标组件 ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Icons = {
            Plus: (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>,
            Minus: (props) => <IconBase {...props}><path d="M5 12h14"/></IconBase>,
            Trash2: (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>,
            Edit: (props) => <IconBase {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></IconBase>,
            ExternalLink: (props) => <IconBase {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></IconBase>,
            Video: (props) => <IconBase {...props}><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></IconBase>,
            FileText: (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></IconBase>,
            Globe: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconBase>,
            GraduationCap: (props) => <IconBase {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>,
            X: (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>,
            Search: (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>,
            MonitorPlay: (props) => <IconBase {...props}><path d="m10 7 5 3-5 3z"/><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M12 17v4"/><path d="M8 21h8"/></IconBase>,
            FolderOpen: (props) => <IconBase {...props}><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></IconBase>,
            Cloud: (props) => <IconBase {...props}><path d="M17.5 19c0-3.037-2.463-5.5-5.5-5.5S6.5 15.963 6.5 19"/><path d="M20 16.5a4.5 4.5 0 0 0-4.5-4.5c-2.485 0-4.5 2.015-4.5 4.5"/><path d="M20 16.5h.5a3.5 3.5 0 0 0 0-7h-.5"/><path d="M15 16.5a4.5 4.5 0 0 0-4.5-4.5c-2.485 0-4.5 2.015-4.5 4.5"/><path d="M10 16.5a3.5 3.5 0 0 0-3.5-3.5H6"/></IconBase>,
            CloudOff: (props) => <IconBase {...props}><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.307-.193"/><path d="M21.5 16a3.5 3.5 0 0 0-3.5-3.5c-1.31 0-2.446.738-3.02 1.83"/><path d="M17.5 19c0-3.037-2.463-5.5-5.5-5.5-.32 0-.635.027-.945.08z"/></IconBase>,
            HardDrive: (props) => <IconBase {...props}><line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/></IconBase>,
            Lock: (props) => <IconBase {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconBase>,
            Unlock: (props) => <IconBase {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></IconBase>
        };

        const GRADES = [
            { id: "1", label: "一年级 (Tahun 1)" },
            { id: "2", label: "二年级 (Tahun 2)" },
            { id: "3", label: "三年级 (Tahun 3)" },
            { id: "4", label: "四年级 (Tahun 4)" },
            { id: "5", label: "五年级 (Tahun 5)" },
            { id: "6", label: "六年级 (Tahun 6)" },
        ];

        const SUBJECTS = [
            { id: "BC", label: "华文 (BC)" },
            { id: "BM", label: "国文 (BM)" },
            { id: "BI", label: "英文 (BI)" },
            { id: "MATH", label: "数学 (MT)" },
            { id: "SCI", label: "科学 (SN)" },
            { id: "HIST", label: "历史 (SJ)" },
            { id: "RBT", label: "设计与工艺 (RBT)" },
            { id: "PM", label: "道德 (PM)" },
            { id: "PSV", label: "美术 (PSV)" },
            { id: "MZ", label: "音乐 (PMZ)" },
            { id: "PJPK", label: "体健 (PJPK)" },
            { id: "OTHER", label: "其他 (Lain-lain)" }
        ];

        // 图标映射
        const ResourceIcon = ({ type, size = 24 }) => {
            switch (type) {
                case 'video': return <Icons.Video size={size} className="text-red-500" />;
                case 'doc': return <Icons.FileText size={size} className="text-blue-500" />;
                case 'slide': return <Icons.MonitorPlay size={size} className="text-orange-500" />;
                case 'quiz': return <Icons.GraduationCap size={size} className="text-purple-500" />;
                default: return <Icons.Globe size={size} className="text-gray-500" />;
            }
        };

        const App = () => {
            // ★★★★★ 1. 设置 Google Apps Script 网址 ★★★★★
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFfi7tFjQX8GABRQI-Q9FqmQmQkVWVkMNwYoG36azX-Cvj_lUKP4qjW2Djx5Djm_0d/exec"; 
            
            // ★★★★★ 2. 设置 Google Drive 公共文件夹 ID ★★★★★
            const DRIVE_FOLDER_ID = "1PGYr4oSzKnVdvZ1o8-Cjh0ELgJLnmk0_";

            // ★★★★★ 3. 设置管理员密码 ★★★★★
            const ADMIN_PASSWORD = "1234";

            // 状态设置
            const [syncUrl] = useState(GOOGLE_SCRIPT_URL);
            const [activeTab, setActiveTab] = useState("resources");
            const [driveView, setDriveView] = useState("list");
            const [driveZoom, setDriveZoom] = useState(1);
            
            // 安全状态
            const [isAdmin, setIsAdmin] = useState(false);
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            
            // 数据相关状态
            const [resources, setResources] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isOnline, setIsOnline] = useState(false);
            
            // UI 状态
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedGrade, setSelectedGrade] = useState("ALL");
            const [selectedSubject, setSelectedSubject] = useState("ALL");
            const [searchTerm, setSearchTerm] = useState("");
            
            // 编辑状态
            const [editingId, setEditingId] = useState(null); // null = 添加模式, ID = 编辑模式
            
            // 表单状态
            const [newTitle, setNewTitle] = useState("");
            const [newUrl, setNewUrl] = useState("");
            const [newGrade, setNewGrade] = useState("1");
            const [newSubject, setNewSubject] = useState("BC");
            const [newType, setNewType] = useState("web");

            // 初始化：加载数据
            useEffect(() => {
                fetchResources();
            }, []);

            const fetchResources = async () => {
                if (!syncUrl) {
                    setResources([]); // 无 LocalStorage，直接为空
                    setIsOnline(false);
                    return;
                }

                setIsLoading(true);
                try {
                    const response = await fetch(`${syncUrl}?action=read`);
                    const json = await response.json();
                    if (json.status === 'success') {
                        setResources(json.data);
                        setIsOnline(true);
                        // 不再保存到 localStorage
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                    alert("连接云端失败。由于已禁用本地存储，无法显示离线数据。");
                    setIsOnline(false);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    setIsLoginModalOpen(false);
                    setPasswordInput("");
                } else {
                    alert("密码错误 (Kata laluan salah)!");
                }
            };

            const handleLogout = () => {
                setIsAdmin(false);
            };

            // 打开弹窗准备添加
            const openAddModal = () => {
                setEditingId(null); // 标记为添加模式
                setNewTitle("");
                setNewUrl("");
                setNewGrade("1");
                setNewSubject("BC");
                setNewType("web");
                setIsModalOpen(true);
            };

            // 打开弹窗准备编辑
            const openEditModal = (resource) => {
                setEditingId(resource.id); // 标记为编辑模式，记录 ID
                setNewTitle(resource.title);
                setNewUrl(resource.url);
                setNewGrade(resource.grade || "1");
                setNewSubject(resource.subject || "BC");
                setNewType(resource.type || "web");
                setIsModalOpen(true);
            };

            const handleSaveResource = async (e) => {
                e.preventDefault();
                if (!isAdmin) return;
                if (!newTitle || !newUrl) return;

                if (editingId) {
                    // --- 修改逻辑 ---
                    const updatedItem = {
                        id: editingId, // 保持原 ID
                        title: newTitle,
                        url: newUrl.startsWith('http') ? newUrl : `https://${newUrl}`,
                        grade: newGrade,
                        subject: newSubject,
                        type: newType
                    };

                    // 乐观更新
                    setResources(prev => prev.map(item => item.id === editingId ? updatedItem : item));
                    
                    if (isOnline && syncUrl) {
                        try {
                            await fetch(syncUrl + "?action=edit", {
                                method: "POST",
                                body: JSON.stringify(updatedItem)
                            });
                        } catch (error) {
                            alert("修改云端失败，请检查网络或脚本。");
                        }
                    }
                } else {
                    // --- 添加逻辑 ---
                    const newItem = {
                        id: Date.now(),
                        title: newTitle,
                        url: newUrl.startsWith('http') ? newUrl : `https://${newUrl}`,
                        grade: newGrade,
                        subject: newSubject,
                        type: newType
                    };

                    // 乐观更新
                    setResources(prev => [newItem, ...prev]);

                    if (isOnline && syncUrl) {
                        try {
                            await fetch(syncUrl + "?action=add", {
                                method: "POST",
                                body: JSON.stringify(newItem)
                            });
                        } catch (error) {
                            alert("上传云端失败。");
                        }
                    }
                }

                setIsModalOpen(false);
                // 重置表单
                setNewTitle("");
                setNewUrl("");
                setEditingId(null);
            };

            const handleDelete = async (id) => {
                if (!isAdmin) return;
                if (!window.confirm("确定要删除 (Padam) ?")) return;

                const updatedList = resources.filter(r => r.id != id);
                setResources(updatedList);

                if (isOnline && syncUrl) {
                    try {
                        await fetch(syncUrl + "?action=delete", {
                            method: "POST",
                            body: JSON.stringify({ id: id })
                        });
                    } catch (error) {
                        alert("云端删除失败");
                    }
                }
            };

            // 缩放控制函数
            const handleZoomIn = () => setDriveZoom(prev => Math.min(prev + 0.1, 1.2));
            const handleZoomOut = () => setDriveZoom(prev => Math.max(prev - 0.1, 0.5));

            const filteredResources = resources.filter(resource => {
                const rGrade = String(resource.grade || "OTHER");
                const rSubject = String(resource.subject || "OTHER");
                const rTitle = String(resource.title || "");

                const matchesGrade = selectedGrade === "ALL" || rGrade === selectedGrade;
                const matchesSubject = selectedSubject === "ALL" || rSubject === selectedSubject;
                const matchesSearch = rTitle.toLowerCase().includes(searchTerm.toLowerCase());
                
                return matchesGrade && matchesSubject && matchesSearch;
            });

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-slate-800 text-white shadow-lg sticky top-0 z-50">
                        <div className="container mx-auto px-4 py-3">
                            <div className="flex justify-between items-center mb-3">
                                <div className="flex items-center gap-3">
                                    <Icons.FolderOpen size={32} className="text-yellow-400" />
                                    <div>
                                        <h1 className="text-xl md:text-2xl font-bold tracking-wide flex items-center gap-2">
                                            新廊华小教学资源库
                                            {isLoading && <div className="loader ml-2"></div>}
                                        </h1>
                                        <div className="flex items-center gap-1 text-xs text-slate-400">
                                            <span>Pusat Sumber SJK(C) Ladang Grisek</span>
                                            {syncUrl ? (
                                                isOnline ? <span className="text-green-400 flex items-center gap-1">● Online</span> : <span className="text-red-400 flex items-center gap-1">● Offline</span>
                                            ) : (
                                                <span className="text-yellow-500 flex items-center gap-1">⚠ Local</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    {/* 管理员登录/登出按钮 */}
                                    {isAdmin ? (
                                        <button 
                                            onClick={handleLogout}
                                            className="bg-red-500/20 hover:bg-red-500/40 text-red-200 px-3 py-2 rounded-xl flex items-center gap-2 transition-colors border border-red-500/50"
                                            title="退出管理模式"
                                        >
                                            <Icons.Unlock size={20} />
                                            <span className="hidden md:inline text-sm">已解锁</span>
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={() => setIsLoginModalOpen(true)}
                                            className="bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-2 rounded-xl flex items-center gap-2 transition-colors"
                                            title="管理员登录 (Admin Login)"
                                        >
                                            <Icons.Lock size={20} />
                                            <span className="hidden md:inline text-sm">管理员登录</span>
                                        </button>
                                    )}

                                    {/* 添加按钮 - 仅管理员可见 */}
                                    {isAdmin && (
                                        <button 
                                            onClick={openAddModal}
                                            className="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white px-4 md:px-6 py-2 md:py-3 rounded-xl font-bold flex items-center gap-2 transition-colors shadow-md text-base md:text-lg animate-fade-in"
                                        >
                                            <Icons.Plus size={24} />
                                            <span className="hidden md:inline">添加 (Tambah)</span>
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div className="flex gap-2 bg-slate-700 p-1 rounded-xl w-full md:w-auto md:inline-flex">
                                <button onClick={() => setActiveTab("resources")} className={`flex-1 md:flex-none px-6 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-all ${activeTab === "resources" ? "bg-white text-slate-800 shadow-md" : "text-slate-300 hover:text-white hover:bg-slate-600"}`}>
                                    <Icons.FolderOpen size={20} /> 资源库 (Sumber)
                                </button>
                                <button onClick={() => setActiveTab("drive")} className={`flex-1 md:flex-none px-6 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-all ${activeTab === "drive" ? "bg-white text-slate-800 shadow-md" : "text-slate-300 hover:text-white hover:bg-slate-600"}`}>
                                    <Icons.HardDrive size={20} /> 公共网盘 (Google Drive)
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 container mx-auto px-4 py-6">
                        {activeTab === "resources" ? (
                            <>
                                <div className="mb-6 flex flex-col gap-4 bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex flex-col gap-2">
                                        <span className="text-sm font-bold text-slate-500 uppercase">年级 / Tahun</span>
                                        <div className="flex flex-nowrap overflow-x-auto gap-2 no-scrollbar pb-2">
                                            <button onClick={() => setSelectedGrade("ALL")} className={`px-4 py-2 rounded-lg text-sm font-medium border flex-shrink-0 ${selectedGrade === "ALL" ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-50'}`}>全部 (Semua)</button>
                                            {GRADES.map(g => (
                                                <button key={g.id} onClick={() => setSelectedGrade(g.id)} className={`px-4 py-2 rounded-lg text-sm font-medium border flex-shrink-0 ${selectedGrade === g.id ? 'bg-blue-600 text-white' : 'bg-white text-slate-600 hover:bg-slate-50'}`}>{g.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-2 border-t border-slate-100 pt-4">
                                        <span className="text-sm font-bold text-slate-500 uppercase">科目 / Subjek</span>
                                        <div className="flex flex-nowrap overflow-x-auto gap-2 no-scrollbar pb-2">
                                            <button onClick={() => setSelectedSubject("ALL")} className={`px-4 py-2 rounded-lg text-sm font-medium border flex-shrink-0 ${selectedSubject === "ALL" ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-50'}`}>全部 (Semua)</button>
                                            {SUBJECTS.map(s => (
                                                <button key={s.id} onClick={() => setSelectedSubject(s.id)} className={`px-4 py-2 rounded-lg text-sm font-medium border flex-shrink-0 ${selectedSubject === s.id ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600 hover:bg-slate-50'}`}>{s.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="relative w-full border-t border-slate-100 pt-4 mt-2">
                                        <Icons.Search className="absolute left-4 top-1/2 transform translate-y-2 md:translate-y-1 text-gray-400" size={20} />
                                        <input type="text" placeholder="搜索标题... (Cari Tajuk...)" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg bg-slate-50" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                    {filteredResources.length > 0 ? (
                                        filteredResources.map(resource => (
                                            <div key={resource.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col justify-between card-hoverable hover:shadow-lg h-64">
                                                <div>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className="p-3 bg-slate-50 rounded-xl">
                                                            <ResourceIcon type={resource.type} size={32} />
                                                        </div>
                                                        <div className="flex flex-col items-end">
                                                            <span className="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded-md mb-1">{GRADES.find(g => g.id == resource.grade)?.label.split("(")[0] || resource.grade}</span>
                                                            <span className="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-1 rounded-md">{SUBJECTS.find(s => s.id == resource.subject)?.label.split("(")[0] || resource.subject}</span>
                                                        </div>
                                                    </div>
                                                    <h3 className="text-xl font-bold text-slate-800 line-clamp-2 leading-tight mb-2">{resource.title}</h3>
                                                </div>
                                                <div className="flex gap-3 mt-4">
                                                    <a href={resource.url} target="_blank" rel="noopener noreferrer" className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-center py-3 rounded-xl font-bold text-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                                        <Icons.ExternalLink size={20} /> 打开 (Buka)
                                                    </a>
                                                    {isAdmin && (
                                                        <>
                                                            <button onClick={() => openEditModal(resource)} className="px-3 py-3 text-slate-400 hover:text-blue-500 hover:bg-blue-50 rounded-xl transition-colors border border-transparent hover:border-blue-100" title="编辑 (Edit)">
                                                                <Icons.Edit size={24} />
                                                            </button>
                                                            <button onClick={() => handleDelete(resource.id)} className="px-3 py-3 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors border border-transparent hover:border-red-100" title="删除 (Padam)">
                                                                <Icons.Trash2 size={24} />
                                                            </button>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        ))
                                    ) : null}
                                </div>
                            </>
                        ) : (
                            <div className="h-full flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[650px] relative">
                                {DRIVE_FOLDER_ID ? (
                                    <>
                                        <div className="bg-slate-50 border-b border-slate-200 px-4 py-2 flex justify-end gap-2 items-center z-10 relative">
                                            <div className="flex items-center gap-1 bg-white rounded-md border border-slate-200 p-0.5 mr-3">
                                                <button onClick={handleZoomOut} className="p-1 hover:bg-slate-100 rounded text-slate-500" title="Zoom Out (-)">
                                                    <Icons.Minus size={16} />
                                                </button>
                                                <span className="text-xs font-mono w-10 text-center">{Math.round(driveZoom * 100)}%</span>
                                                <button onClick={handleZoomIn} className="p-1 hover:bg-slate-100 rounded text-slate-500" title="Zoom In (+)">
                                                    <Icons.Plus size={16} />
                                                </button>
                                            </div>
                                            <span className="text-xs text-slate-400 self-center mr-2 uppercase font-bold tracking-wider">视图 (Paparan):</span>
                                            <button onClick={() => setDriveView("list")} className={`px-3 py-1 text-sm rounded-md flex items-center gap-1 transition-colors ${driveView === "list" ? "bg-white text-blue-600 shadow border border-blue-100 font-bold" : "text-slate-500 hover:bg-slate-200"}`}>
                                                <Icons.FileText size={16} /> 列表 (List)
                                            </button>
                                            <button onClick={() => setDriveView("grid")} className={`px-3 py-1 text-sm rounded-md flex items-center gap-1 transition-colors ${driveView === "grid" ? "bg-white text-blue-600 shadow border border-blue-100 font-bold" : "text-slate-500 hover:bg-slate-200"}`}>
                                                <Icons.Video size={16} /> 网格 (Grid)
                                            </button>
                                        </div>
                                        <div className="flex-1 relative overflow-hidden bg-white">
                                            <iframe 
                                                src={`https://drive.google.com/embeddedfolderview?id=${DRIVE_FOLDER_ID}#${driveView}`}
                                                style={{
                                                    transform: `scale(${driveZoom})`,
                                                    transformOrigin: "0 0",
                                                    width: `${100 / driveZoom}%`,
                                                    height: `${100 / driveZoom}%`
                                                }}
                                                className="border-0 absolute inset-0"
                                                title="Google Drive"
                                            ></iframe>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 flex flex-col items-center justify-center p-10 text-slate-400">
                                        <Icons.HardDrive size={80} className="mb-6 opacity-30" />
                                        <h3 className="text-2xl font-bold text-slate-600 mb-2">Google Drive 未连接</h3>
                                        <p className="text-lg mb-4">Belum Disambung ke Google Drive</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* 登录弹窗 */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 animate-fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden">
                                <div className="bg-slate-800 p-6 flex justify-between items-center text-white">
                                    <h2 className="text-xl font-bold">管理员登录 (Admin Login)</h2>
                                    <button onClick={() => setIsLoginModalOpen(false)} className="hover:bg-slate-700 p-2 rounded-full"><Icons.X size={24} /></button>
                                </div>
                                <form onSubmit={handleLogin} className="p-6 flex flex-col gap-6">
                                    <div>
                                        <label className="block text-slate-700 font-bold mb-2">请输入密码 (Kata Laluan)</label>
                                        <input 
                                            type="password" 
                                            autoFocus
                                            value={passwordInput}
                                            onChange={(e) => setPasswordInput(e.target.value)}
                                            className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 text-lg text-center tracking-widest"
                                            placeholder="****"
                                        />
                                    </div>
                                    <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-lg shadow-lg">
                                        解锁 (Buka Kunci)
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 animate-fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
                                <div className="bg-slate-800 p-6 flex justify-between items-center text-white sticky top-0 z-10">
                                    <div>
                                        {/* 动态标题：添加或修改 */}
                                        <h2 className="text-xl md:text-2xl font-bold">{editingId ? "修改资源" : "添加资源"}</h2>
                                        <p className="text-xs text-slate-300">{editingId ? "Edit Sumber" : "Tambah Sumber Baharu"}</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="hover:bg-slate-700 p-2 rounded-full"><Icons.X size={28} /></button>
                                </div>
                                <form onSubmit={handleSaveResource} className="p-6 md:p-8 flex flex-col gap-6">
                                    <div><label className="block text-slate-700 font-bold mb-2 text-lg">资源标题 <span className="text-sm font-normal text-slate-500 ml-1">(Tajuk)</span></label><input type="text" required value={newTitle} onChange={(e) => setNewTitle(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 text-lg" /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-slate-700 font-bold mb-2 text-lg">年级 <span className="text-sm font-normal text-slate-500 ml-1">(Tahun)</span></label><select value={newGrade} onChange={(e) => setNewGrade(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 text-lg bg-white">{GRADES.map(g => <option key={g.id} value={g.id}>{g.label}</option>)}</select></div>
                                        <div><label className="block text-slate-700 font-bold mb-2 text-lg">科目 <span className="text-sm font-normal text-slate-500 ml-1">(Subjek)</span></label><select value={newSubject} onChange={(e) => setNewSubject(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 text-lg bg-white">{SUBJECTS.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
                                    </div>
                                    <div><label className="block text-slate-700 font-bold mb-2 text-lg">类型 <span className="text-sm font-normal text-slate-500 ml-1">(Jenis)</span></label><select value={newType} onChange={(e) => setNewType(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 text-lg bg-white"><option value="web">网页/链接 (Web/Link)</option><option value="slide">课件/PPT (Slaid)</option><option value="video">视频 (Video)</option><option value="quiz">测验 (Kuiz)</option><option value="doc">文档 (Dokumen)</option></select></div>
                                    <div><label className="block text-slate-700 font-bold mb-2 text-lg">链接地址 <span className="text-sm font-normal text-slate-500 ml-1">(URL)</span></label><input type="url" required value={newUrl} onChange={(e) => setNewUrl(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 text-lg text-blue-600" /></div>
                                    <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-xl shadow-lg mt-2 flex flex-col items-center leading-tight">
                                        {/* 动态按钮文字 */}
                                        <span>{editingId ? "确认修改" : "确认添加"}</span>
                                        <span className="text-sm font-normal opacity-80">{editingId ? "Sahkan Edit" : "Sahkan Tambah"}</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
