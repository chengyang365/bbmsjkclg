<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新廊华小一站式教学资源库 (Pusat Sehenti BBM SJK(C) Ladang Grisek)</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://images.emojiterra.com/google/android-12l/512px/1f4da.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://images.emojiterra.com/google/android-12l/512px/1f4da.png">
    <link rel="apple-touch-icon" href="https://images.emojiterra.com/google/android-12l/512px/1f4da.png">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans', 'Noto Sans SC', sans-serif; background-color: #f8fafc; touch-action: manipulation; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse-fast { animation: pulse-fast 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes slideUpFade { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .toast-enter { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .glass-nav { background-color: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Icons = {
            Plus: (p) => <IconBase {...p}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>,
            Minus: (p) => <IconBase {...p}><path d="M5 12h14"/></IconBase>,
            Trash2: (p) => <IconBase {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>,
            Edit: (p) => <IconBase {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7.5L11 4z"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></IconBase>,
            ExternalLink: (p) => <IconBase {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></IconBase>,
            Video: (p) => <IconBase {...p}><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></IconBase>,
            FileText: (p) => <IconBase {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></IconBase>,
            Globe: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconBase>,
            GraduationCap: (p) => <IconBase {...p}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>,
            Book: (p) => <IconBase {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></IconBase>,
            BookOpen: (p) => <IconBase {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>,
            X: (p) => <IconBase {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>,
            Search: (p) => <IconBase {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>,
            MonitorPlay: (p) => <IconBase {...p}><path d="m10 7 5 3-5 3z"/><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M12 17v4"/><path d="M8 21h8"/></IconBase>,
            FolderOpen: (p) => <IconBase {...p}><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></IconBase>,
            Cloud: (p) => <IconBase {...p}><path d="M17.5 19c0-3.037-2.463-5.5-5.5-5.5S6.5 15.963 6.5 19"/><path d="M20 16.5a4.5 4.5 0 0 0-4.5-4.5c-2.485 0-4.5 2.015-4.5 4.5"/><path d="M20 16.5h.5a3.5 3.5 0 0 0 0-7h-.5"/><path d="M15 16.5a4.5 4.5 0 0 0-4.5-4.5c-2.485 0-4.5 2.015-4.5 4.5"/><path d="M10 16.5a3.5 3.5 0 0 0-3.5-3.5H6"/></IconBase>,
            CloudOff: (p) => <IconBase {...p}><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.307-.193"/><path d="M21.5 16a3.5 3.5 0 0 0-3.5-3.5c-1.31 0-2.446.738-3.02 1.83"/><path d="M17.5 19c0-3.037-2.463-5.5-5.5-5.5-.32 0-.635.027-.945.08z"/></IconBase>,
            HardDrive: (p) => <IconBase {...p}><line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/></IconBase>,
            Lock: (p) => <IconBase {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconBase>,
            Unlock: (p) => <IconBase {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></IconBase>,
            Check: (p) => <IconBase {...p}><polyline points="20 6 9 17 4 12"/></IconBase>,
            AlertCircle: (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>,
            Grid: (p) => <IconBase {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></IconBase>,
            Image: (p) => <IconBase {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>,
            School: (p) => <IconBase {...p}><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 1 0-4 0v4"/><path d="M18 5v17"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></IconBase>
        };

        const GRADES = [
            { id: "1", label: "一年级 (Tahun 1)", shortMs: "Thn 1", tagClass: "bg-pink-100 text-pink-700 ring-1 ring-pink-200" },
            { id: "2", label: "二年级 (Tahun 2)", shortMs: "Thn 2", tagClass: "bg-orange-100 text-orange-700 ring-1 ring-orange-200" },
            { id: "3", label: "三年级 (Tahun 3)", shortMs: "Thn 3", tagClass: "bg-yellow-100 text-yellow-700 ring-1 ring-yellow-200" },
            { id: "4", label: "四年级 (Tahun 4)", shortMs: "Thn 4", tagClass: "bg-emerald-100 text-emerald-700 ring-1 ring-emerald-200" },
            { id: "5", label: "五年级 (Tahun 5)", shortMs: "Thn 5", tagClass: "bg-cyan-100 text-cyan-700 ring-1 ring-cyan-200" },
            { id: "6", label: "六年级 (Tahun 6)", shortMs: "Thn 6", tagClass: "bg-violet-100 text-violet-700 ring-1 ring-violet-200" },
            { id: "GENERAL", label: "通用 (Umum)", shortMs: "Umum", tagClass: "bg-slate-100 text-slate-700 ring-1 ring-slate-200" },
        ];

        const SUBJECTS = [
            { id: "BC", label: "华文 (BC)", shortMs: "BC", tagClass: "bg-red-100 text-red-800 ring-1 ring-red-200", borderClass: "border-l-red-500" },
            { id: "BM", label: "国文 (BM)", shortMs: "BM", tagClass: "bg-yellow-100 text-yellow-800 ring-1 ring-yellow-200", borderClass: "border-l-yellow-500" },
            { id: "BI", label: "英文 (BI)", shortMs: "BI", tagClass: "bg-blue-100 text-blue-800 ring-1 ring-blue-200", borderClass: "border-l-blue-500" },
            { id: "MATH", label: "数学 (MT)", shortMs: "MT", tagClass: "bg-cyan-100 text-cyan-800 ring-1 ring-cyan-200", borderClass: "border-l-cyan-500" },
            { id: "SCI", label: "科学 (SN)", shortMs: "SN", tagClass: "bg-green-100 text-green-800 ring-1 ring-green-200", borderClass: "border-l-green-500" },
            { id: "HIST", label: "历史 (SJ)", shortMs: "SJ", tagClass: "bg-orange-100 text-orange-800 ring-1 ring-orange-200", borderClass: "border-l-orange-500" },
            { id: "RBT", label: "设计与工艺 (RBT)", shortMs: "RBT", tagClass: "bg-indigo-100 text-indigo-800 ring-1 ring-indigo-200", borderClass: "border-l-indigo-500" },
            { id: "PM", label: "道德 (PM)", shortMs: "PM", tagClass: "bg-pink-100 text-pink-800 ring-1 ring-pink-200", borderClass: "border-l-pink-500" },
            { id: "PSV", label: "美术 (PSV)", shortMs: "PSV", tagClass: "bg-purple-100 text-purple-800 ring-1 ring-purple-200", borderClass: "border-l-purple-500" },
            { id: "MZ", label: "音乐 (PMZ)", shortMs: "PMZ", tagClass: "bg-rose-100 text-rose-800 ring-1 ring-rose-200", borderClass: "border-l-rose-500" },
            { id: "PJPK", label: "体健 (PJPK)", shortMs: "PJPK", tagClass: "bg-teal-100 text-teal-800 ring-1 ring-teal-200", borderClass: "border-l-teal-500" },
            { id: "OTHER", label: "其他 (Lain-lain)", shortMs: "Lain", tagClass: "bg-gray-100 text-gray-800 ring-1 ring-gray-200", borderClass: "border-l-gray-500" }
        ];

        // 骨架屏组件
        const SkeletonCard = () => (
            <div className="bg-white rounded-2xl shadow-sm p-4 border border-slate-100 h-40 flex flex-col justify-between animate-pulse-fast">
                <div>
                    <div className="flex justify-between items-start mb-3">
                        <div className="w-10 h-10 bg-slate-200 rounded-xl"></div>
                        <div className="flex gap-2">
                            <div className="w-12 h-8 bg-slate-200 rounded-lg"></div>
                            <div className="w-12 h-8 bg-slate-200 rounded-lg"></div>
                        </div>
                    </div>
                    <div className="space-y-2">
                        <div className="w-full h-5 bg-slate-200 rounded-md"></div>
                        <div className="w-2/3 h-5 bg-slate-200 rounded-md"></div>
                    </div>
                </div>
            </div>
        );

        const ResourceIcon = ({ type, size = 24 }) => {
            switch (type) {
                case 'video': return <Icons.Video size={size} className="text-red-500" />;
                case 'doc': return <Icons.FileText size={size} className="text-blue-500" />;
                case 'slide': return <Icons.MonitorPlay size={size} className="text-orange-500" />;
                case 'quiz': return <Icons.GraduationCap size={size} className="text-purple-500" />;
                case 'textbook': return <Icons.Book size={size} className="text-emerald-600" />;
                case 'workbook': return <Icons.BookOpen size={size} className="text-indigo-500" />;
                default: return <Icons.Globe size={size} className="text-gray-500" />;
            }
        };

        const DigitalClock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const getOrdinal = (n) => {
                const s = ["th", "st", "nd", "rd"];
                const v = n % 100;
                return n + (s[(v - 20) % 10] || s[v] || s[0]);
            };

            const day = time.getDate();
            const month = time.getMonth();
            const year = time.getFullYear();
            const weekday = time.getDay();

            const msMonths = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
            const msDays = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];
            const enMonths = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const enDays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

            const zhDays = ["日", "一", "二", "三", "四", "五", "六"];

            const dateZH = `${year}年${month + 1}月${day}日（星期${zhDays[weekday]}）`;
            const dateMS = `${day} ${msMonths[month]} ${year} (${msDays[weekday]})`;
            const dateEN = `${getOrdinal(day)} ${enMonths[month]} ${year} (${enDays[weekday]})`;

            return (
                <div className="flex flex-col items-end text-right mr-2 md:mr-4 text-slate-200">
                    <div className="text-2xl md:text-3xl font-bold font-[Roboto_Mono] leading-none tracking-wider tabular-nums mb-1">
                        {time.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit' })}
                    </div>
                    <div className="flex flex-col text-[10px] md:text-xs opacity-90 font-medium leading-tight">
                        <span>{dateZH}</span>
                        <span>{dateMS}</span>
                        <span>{dateEN}</span>
                    </div>
                </div>
            );
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
            return (
                <div className={`fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[60] toast-enter min-w-[280px] justify-center border border-slate-700/50 backdrop-blur-md`}>
                    {type === 'success' ? <Icons.Check size={20} className="text-emerald-400" /> : <Icons.AlertCircle size={20} className="text-red-400" />}
                    <span className="font-medium tracking-wide">{message}</span>
                </div>
            );
        };

        const App = () => {
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwBPfoqnAYq9susLsyqcpUXdfQQfvStD--8qfdRdGiFpSJknuaonag0nN7LWOQzAtZi/exec"; 
            const DRIVE_FOLDER_ID = "1PGYr4oSzKnVdvZ1o8-Cjh0ELgJLnmk0_";

            const [syncUrl] = useState(GOOGLE_SCRIPT_URL);
            const [activeTab, setActiveTab] = useState("resources");
            const [driveView, setDriveView] = useState("list");
            const [driveZoom, setDriveZoom] = useState(1);
            
            const [isAdmin, setIsAdmin] = useState(false);
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            
            const [resources, setResources] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isOnline, setIsOnline] = useState(false);
            const [toast, setToast] = useState(null);
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedGrade, setSelectedGrade] = useState("ALL");
            const [selectedSubject, setSelectedSubject] = useState("ALL");
            const [searchTerm, setSearchTerm] = useState("");
            const [editingId, setEditingId] = useState(null);
            
            const [newTitle, setNewTitle] = useState("");
            const [newUrl, setNewUrl] = useState("");
            const [newGrade, setNewGrade] = useState("1");
            const [newSubject, setNewSubject] = useState("BC");
            const [newType, setNewType] = useState("web");
            const [newImage, setNewImage] = useState("");

            useEffect(() => { fetchResources(); showToast("欢迎使用新廊华小资源库！"); }, []);

            const showToast = (message, type = 'success') => setToast({ message, type });

            const fetchResources = async () => {
                if (!syncUrl) { setResources([]); setIsOnline(false); setIsLoading(false); return; }
                setIsLoading(true);
                try {
                    const response = await fetch(`${syncUrl}?action=read`);
                    const json = await response.json();
                    if (json.status === 'success') { setResources(json.data); setIsOnline(true); }
                } catch (error) {
                    showToast("连接云端失败 (Offline)", "error");
                    setIsOnline(false);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!isOnline) { showToast("请先连接网络", "error"); return; }
                
                try {
                    const response = await fetch(`${syncUrl}?action=login`, {
                        method: "POST",
                        body: JSON.stringify({ password: passwordInput })
                    });
                    const json = await response.json();
                    
                    if (json.status === "success") {
                        setIsAdmin(true); 
                        setIsLoginModalOpen(false); 
                        setPasswordInput(""); 
                        showToast("管理员登录成功");
                    } else {
                        showToast("密码错误", "error");
                    }
                } catch(e) {
                    showToast("验证失败", "error");
                }
            };

            const openAddModal = () => {
                setEditingId(null); setNewTitle(""); setNewUrl(""); setNewGrade("1"); setNewSubject("BC"); setNewType("web"); setNewImage(""); setIsModalOpen(true);
            };

            const openEditModal = (r) => {
                setEditingId(r.id); setNewTitle(r.title); setNewUrl(r.url); setNewGrade(r.grade || "1"); setNewSubject(r.subject || "BC"); setNewType(r.type || "web"); setNewImage(r.image || ""); setIsModalOpen(true);
            };

            const handleSaveResource = async (e) => {
                e.preventDefault();
                if (!isAdmin || !newTitle || !newUrl) return;
                setIsModalOpen(false);
                
                showToast(editingId ? "正在修改..." : "正在添加...");

                const item = { 
                    id: editingId || Date.now(), 
                    title: newTitle, 
                    url: newUrl.startsWith('http') ? newUrl : `https://${newUrl}`, 
                    grade: newGrade, 
                    subject: newSubject, 
                    type: newType,
                    image: newImage 
                };
                
                if (editingId) {
                    setResources(prev => prev.map(i => i.id === editingId ? item : i));
                    if (isOnline) await fetch(syncUrl + "?action=edit", { method: "POST", body: JSON.stringify(item) }).catch(() => showToast("修改失败", "error"));
                    else showToast("修改成功 (本地)", "success");
                } else {
                    setResources(prev => [item, ...prev]);
                    if (isOnline) await fetch(syncUrl + "?action=add", { method: "POST", body: JSON.stringify(item) }).catch(() => showToast("添加失败", "error"));
                    else showToast("添加成功 (本地)", "success");
                }
                
                setNewTitle(""); setNewUrl(""); setNewImage("");
                setEditingId(null);
            };

            const handleDelete = async (id) => {
                if (!isAdmin || !window.confirm("确定要删除 (Padam) ?")) return;
                setResources(prev => prev.filter(r => r.id != id));
                showToast("已删除");
                if (isOnline) await fetch(syncUrl + "?action=delete", { method: "POST", body: JSON.stringify({ id }) }).catch(() => showToast("删除失败", "error"));
            };

            const handleZoomIn = () => setDriveZoom(prev => Math.min(prev + 0.1, 1.2));
            const handleZoomOut = () => setDriveZoom(prev => Math.max(prev - 0.1, 0.5));

            const ResourceCard = ({ resource, isAdmin, onEdit, onDelete }) => {
                const subjectConfig = SUBJECTS.find(s => s.id == resource.subject) || SUBJECTS[SUBJECTS.length - 1];
                const gradeConfig = GRADES.find(g => g.id == resource.grade);
                const hasImage = resource.image && resource.image.trim() !== "";

                return (
                    <div className={`group relative bg-white rounded-2xl shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-slate-100 flex flex-col h-40 card-hoverable hover:shadow-xl hover:shadow-blue-500/5 hover:-translate-y-1 transition-all duration-300 overflow-hidden ${subjectConfig.borderClass} border-l-[6px]`}>
                        {hasImage && (
                            <div className="absolute inset-0 z-0 opacity-10 group-hover:opacity-20 transition-opacity">
                                <img src={resource.image} alt="" className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" />
                            </div>
                        )}
                        <a href={resource.url} target="_blank" rel="noopener noreferrer" className="absolute inset-0 z-10 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label={`Buka ${resource.title}`}></a>
                        <div className="relative z-20 flex flex-col h-full pointer-events-none p-4">
                            <div className="flex justify-between items-start mb-2">
                                <div className="p-2.5 bg-slate-50/80 backdrop-blur-sm rounded-xl group-hover:scale-110 transition-transform duration-300 shadow-sm border border-slate-100/50">
                                    {hasImage ? (
                                        <div className="w-6 h-6 overflow-hidden rounded-md">
                                            <img src={resource.image} className="w-full h-full object-cover" alt="icon" />
                                        </div>
                                    ) : (
                                        <ResourceIcon type={resource.type} size={24} />
                                    )}
                                </div>
                                <div className="flex flex-col items-end gap-1.5">
                                    <div className={`flex flex-col items-center justify-center px-2 py-0.5 rounded-lg leading-tight shadow-sm ${gradeConfig ? gradeConfig.tagClass : 'bg-slate-100 text-slate-600'}`}>
                                        <span className="text-[10px] font-bold">{gradeConfig?.label.split(" (")[0] || resource.grade}</span>
                                        <span className="text-[8px] font-bold opacity-80 uppercase tracking-tight">{gradeConfig?.shortMs || ""}</span>
                                    </div>
                                    <div className={`flex flex-col items-center justify-center px-2 py-0.5 rounded-lg leading-tight shadow-sm ${subjectConfig.tagClass}`}>
                                        <span className="text-[10px] font-bold">{subjectConfig.label.split(" (")[0]}</span>
                                        <span className="text-[8px] font-bold opacity-80 uppercase tracking-tight">{subjectConfig.shortMs}</span>
                                    </div>
                                </div>
                            </div>
                            <h3 className="text-base font-bold text-slate-800 line-clamp-2 leading-snug group-hover:text-blue-700 transition-colors mt-1 drop-shadow-sm bg-white/50 backdrop-blur-[2px] rounded-lg p-1 -ml-1">
                                {resource.title}
                            </h3>
                        </div>
                        {isAdmin && (
                            <div className="absolute bottom-3 right-3 z-30 flex gap-2">
                                <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); onEdit(resource); }} className="p-2 bg-white/90 backdrop-blur text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full shadow-sm border border-slate-100 transition-colors" title="编辑">
                                    <Icons.Edit size={16} />
                                </button>
                                <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); onDelete(resource.id); }} className="p-2 bg-white/90 backdrop-blur text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full shadow-sm border border-slate-100 transition-colors" title="删除">
                                    <Icons.Trash2 size={16} />
                                </button>
                            </div>
                        )}
                    </div>
                );
            };

            const filteredResources = resources.filter(resource => {
                const rGrade = String(resource.grade || "OTHER");
                const rSubject = String(resource.subject || "OTHER");
                const rTitle = String(resource.title || "");
                const matchesGrade = selectedGrade === "ALL" || rGrade === selectedGrade;
                const matchesSubject = selectedSubject === "ALL" || rSubject === selectedSubject;
                const matchesSearch = rTitle.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesGrade && matchesSubject && matchesSearch;
            });

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <header className="glass-nav text-white shadow-xl sticky top-0 z-50 border-b border-white/10 transition-all duration-300">
                        <div className="container mx-auto px-4 py-3">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-4">
                                    <div className="bg-gradient-to-br from-yellow-300 to-yellow-500 p-2.5 rounded-xl shadow-lg shadow-yellow-500/20">
                                        <Icons.School size={28} className="text-slate-900" />
                                    </div>
                                    <div>
                                        <h1 className="text-xl md:text-2xl font-bold tracking-tight flex items-center gap-3">
                                            新廊华小一站式教学资源库
                                        </h1>
                                        <div className="flex items-center gap-2 text-xs text-slate-300 font-medium">
                                            <span className="opacity-80">Pusat Sehenti BBM SJK(C) Ladang Grisek</span>
                                            {isOnline ? 
                                                <span className="bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded-full border border-emerald-500/30 flex items-center gap-1"><div className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div> Online</span> : 
                                                <span className="bg-red-500/20 text-red-300 px-2 py-0.5 rounded-full border border-red-500/30 flex items-center gap-1"><div className="w-1.5 h-1.5 rounded-full bg-red-400"></div> Offline</span>
                                            }
                                        </div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <DigitalClock />
                                    {isAdmin ? (
                                        <button onClick={() => {setIsAdmin(false); showToast("已退出管理模式");}} className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded-xl flex items-center gap-2 transition-all border border-slate-700" title="退出">
                                            <Icons.Unlock size={20} />
                                        </button>
                                    ) : (
                                        <button onClick={() => setIsLoginModalOpen(true)} className="bg-white/10 hover:bg-white/20 text-white px-3 py-2 rounded-xl flex items-center gap-2 transition-all backdrop-blur-md" title="登录">
                                            <Icons.Lock size={20} />
                                        </button>
                                    )}
                                    {isAdmin && (
                                        <button onClick={openAddModal} className="bg-blue-600 hover:bg-blue-500 hover:scale-105 active:scale-95 text-white p-2.5 md:px-5 md:py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-blue-600/30">
                                            <Icons.Plus size={24} />
                                            <span className="hidden md:inline">添加</span>
                                        </button>
                                    )}
                                </div>
                            </div>
                            
                            <div className="flex p-1 bg-slate-800/50 rounded-xl w-full md:w-auto md:inline-flex backdrop-blur-sm border border-white/5 relative">
                                <button onClick={() => setActiveTab("resources")} className={`flex-1 md:flex-none px-8 py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 transition-all duration-300 ${activeTab === "resources" ? "bg-white text-slate-900 shadow-md scale-[1.02]" : "text-slate-400 hover:text-white hover:bg-white/5"}`}>
                                    <Icons.FolderOpen size={18} /> 资源库 (Sumber)
                                </button>
                                <button onClick={() => setActiveTab("drive")} className={`flex-1 md:flex-none px-8 py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 transition-all duration-300 ${activeTab === "drive" ? "bg-white text-slate-900 shadow-md scale-[1.02]" : "text-slate-400 hover:text-white hover:bg-white/5"}`}>
                                    <Icons.HardDrive size={18} /> 网盘 (Google Drive)
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 container mx-auto px-4 py-8 max-w-7xl">
                        {activeTab === "resources" ? (
                            <>
                                <div className="mb-8 flex flex-col gap-4 bg-white p-4 md:p-5 rounded-3xl shadow-sm border border-slate-100">
                                    <div className="space-y-2">
                                        <div className="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-wider">
                                            <span className="w-2 h-2 bg-pink-400 rounded-full"></span> 年级 (Tahun)
                                        </div>
                                        <div className="flex flex-nowrap overflow-x-auto gap-3 no-scrollbar pb-1">
                                            <button onClick={() => setSelectedGrade("ALL")} className={`px-4 py-1.5 rounded-full text-sm font-bold transition-all whitespace-nowrap ${selectedGrade === "ALL" ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/20 transform scale-105' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>全部 (Semua)</button>
                                            {GRADES.map(g => (
                                                <button key={g.id} onClick={() => setSelectedGrade(g.id)} className={`px-4 py-1.5 rounded-full text-sm font-bold transition-all whitespace-nowrap border-2 border-transparent ${selectedGrade === g.id ? 'bg-white border-current shadow-md transform scale-105 ' + g.tagClass.split(' ')[1] + ' border-' + g.tagClass.split('-')[1] + '-200' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`} style={selectedGrade === g.id ? {borderColor: 'currentColor'} : {}}>{g.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="w-full h-px bg-slate-100"></div>
                                    <div className="space-y-2">
                                        <div className="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-wider">
                                            <span className="w-2 h-2 bg-blue-400 rounded-full"></span> 科目 (Mata Pelajaran)
                                        </div>
                                        <div className="flex flex-nowrap overflow-x-auto gap-3 no-scrollbar pb-1">
                                            <button onClick={() => setSelectedSubject("ALL")} className={`px-4 py-1.5 rounded-full text-sm font-bold transition-all whitespace-nowrap ${selectedSubject === "ALL" ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/20 transform scale-105' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>全部 (Semua)</button>
                                            {SUBJECTS.map(s => (
                                                <button key={s.id} onClick={() => setSelectedSubject(s.id)} className={`px-4 py-1.5 rounded-full text-sm font-bold transition-all whitespace-nowrap border-2 border-transparent ${selectedSubject === s.id ? 'bg-white border-current shadow-md transform scale-105 ' + s.tagClass.split(' ')[1] : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`} style={selectedSubject === s.id ? {borderColor: 'currentColor'} : {}}>{s.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="relative w-full group">
                                        <Icons.Search className="absolute left-5 top-1/2 transform -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors" size={22} />
                                        <input type="text" placeholder="搜索资源标题 (Cari Tajuk BBM)..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-14 pr-6 py-3 rounded-2xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none text-lg transition-all placeholder:text-slate-400 font-medium" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                    {isLoading ? (
                                        <>
                                            <SkeletonCard /><SkeletonCard /><SkeletonCard /><SkeletonCard />
                                        </>
                                    ) : (
                                        filteredResources.map(resource => (
                                            <ResourceCard 
                                                key={resource.id} 
                                                resource={resource} 
                                                isAdmin={isAdmin}
                                                onEdit={openEditModal}
                                                onDelete={handleDelete}
                                            />
                                        ))
                                    )}
                                </div>
                            </>
                        ) : (
                            <div className="h-full flex flex-col bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden min-h-[650px] relative">
                                {DRIVE_FOLDER_ID ? (
                                    <>
                                        <div className="bg-slate-50/80 backdrop-blur border-b border-slate-200 px-6 py-3 flex justify-end gap-3 items-center z-10 relative">
                                            <div className="flex items-center gap-1 bg-white rounded-lg border border-slate-200 p-1 mr-4 shadow-sm">
                                                <button onClick={handleZoomOut} className="p-1.5 hover:bg-slate-100 rounded-md text-slate-500 transition-colors" title="缩小"><Icons.Minus size={16} /></button>
                                                <span className="text-xs font-mono font-bold w-12 text-center text-slate-700">{Math.round(driveZoom * 100)}%</span>
                                                <button onClick={handleZoomIn} className="p-1.5 hover:bg-slate-100 rounded-md text-slate-500 transition-colors" title="放大"><Icons.Plus size={16} /></button>
                                            </div>
                                            <div className="flex bg-slate-200/50 p-1 rounded-lg">
                                                <button onClick={() => setDriveView("list")} className={`px-4 py-1.5 text-xs font-bold rounded-md flex items-center gap-1.5 transition-all ${driveView === "list" ? "bg-white text-blue-600 shadow-sm" : "text-slate-500 hover:text-slate-700"}`}>
                                                    <Icons.FileText size={14} /> 列表
                                                </button>
                                                <button onClick={() => setDriveView("grid")} className={`px-4 py-1.5 text-xs font-bold rounded-md flex items-center gap-1.5 transition-all ${driveView === "grid" ? "bg-white text-blue-600 shadow-sm" : "text-slate-500 hover:text-slate-700"}`}>
                                                    <Icons.Grid size={14} /> 网格
                                                </button>
                                            </div>
                                        </div>
                                        <div className="flex-1 relative overflow-hidden bg-white">
                                            <iframe src={`https://drive.google.com/embeddedfolderview?id=${DRIVE_FOLDER_ID}#${driveView}`} style={{transform: `scale(${driveZoom})`, transformOrigin: "0 0", width: `${100 / driveZoom}%`, height: `${100 / driveZoom}%`}} className="border-0 absolute inset-0" title="Google Drive"></iframe>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 flex flex-col items-center justify-center p-10 text-slate-400">
                                        <div className="bg-slate-100 p-6 rounded-full mb-6"><Icons.HardDrive size={64} className="text-slate-300" /></div>
                                        <h3 className="text-2xl font-bold text-slate-600 mb-2">Google Drive 未连接</h3>
                                        <p className="text-lg mb-6 text-slate-500">请在代码中配置 DRIVE_FOLDER_ID</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Toast */}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

                    {/* 登录弹窗 */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden border border-white/20 transform transition-all scale-100">
                                <div className="bg-slate-900 p-8 text-center">
                                    <div className="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-md text-white"><Icons.Lock size={32} /></div>
                                    <h2 className="text-2xl font-bold text-white mb-1">管理员登录</h2>
                                    <p className="text-slate-400 text-sm">请输入密码以继续</p>
                                </div>
                                <form onSubmit={handleLogin} className="p-8 flex flex-col gap-6">
                                    <input type="password" autoFocus value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full px-4 py-4 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white text-2xl text-center tracking-[0.5em] outline-none transition-all placeholder:text-slate-300 font-mono" placeholder="••••" />
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setIsLoginModalOpen(false)} className="flex-1 py-3.5 rounded-xl font-bold text-slate-500 hover:bg-slate-50 transition-colors">取消</button>
                                        <button type="submit" className="flex-1 bg-slate-900 hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95">解锁</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 添加/编辑弹窗 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto border border-slate-100">
                                <div className="bg-white p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 z-10">
                                    <div><h2 className="text-2xl font-bold text-slate-800">{editingId ? "修改资源" : "添加新资源"}</h2></div>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-slate-100 hover:bg-slate-200 p-2 rounded-full text-slate-500 transition-colors"><Icons.X size={24} /></button>
                                </div>
                                <form onSubmit={handleSaveResource} className="p-8 flex flex-col gap-6">
                                    <div><label className="block text-slate-500 font-bold mb-2 text-sm uppercase tracking-wider">标题</label><input type="text" required value={newTitle} onChange={(e) => setNewTitle(e.target.value)} className="w-full px-5 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white outline-none text-lg transition-all" placeholder="输入资源名称..." /></div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <div><label className="block text-slate-500 font-bold mb-2 text-sm uppercase tracking-wider">年级</label><select value={newGrade} onChange={(e) => setNewGrade(e.target.value)} className="w-full px-5 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 outline-none transition-all">{GRADES.map(g => <option key={g.id} value={g.id}>{g.label.split('(')[0]}</option>)}</select></div>
                                        <div><label className="block text-slate-500 font-bold mb-2 text-sm uppercase tracking-wider">科目</label><select value={newSubject} onChange={(e) => setNewSubject(e.target.value)} className="w-full px-5 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 outline-none transition-all">{SUBJECTS.map(s => <option key={s.id} value={s.id}>{s.label.split('(')[0]}</option>)}</select></div>
                                    </div>
                                    <div><label className="block text-slate-500 font-bold mb-2 text-sm uppercase tracking-wider">类型</label><select value={newType} onChange={(e) => setNewType(e.target.value)} className="w-full px-5 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 outline-none transition-all"><option value="web">🔗 网页 / 链接</option><option value="slide">🖥️ 课件 / PPT</option><option value="video">🎬 视频</option><option value="quiz">🎓 测验 / Quiz</option><option value="textbook">📖 课本 / Buku Teks</option><option value="workbook">📝 活动本 / 作业 / Buku Aktiviti</option><option value="doc">📄 文档</option></select></div>
                                    <div><label className="block text-slate-500 font-bold mb-2 text-sm uppercase tracking-wider">链接 URL</label><input type="url" required value={newUrl} onChange={(e) => setNewUrl(e.target.value)} className="w-full px-5 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white outline-none text-lg text-blue-600 font-mono transition-all" placeholder="https://..." /></div>
                                    <div><label className="block text-slate-500 font-bold mb-2 text-sm uppercase tracking-wider">封面图片链接 (URL) <span className="text-xs font-normal lowercase">(可选 / pilihan)</span></label><div className="flex gap-4"><input type="url" value={newImage} onChange={(e) => setNewImage(e.target.value)} className="flex-1 px-5 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white outline-none text-lg transition-all" placeholder="https://image.com/cover.jpg" />{newImage && <div className="w-14 h-14 rounded-lg overflow-hidden border border-slate-200"><img src={newImage} className="w-full h-full object-cover" alt="Preview" onError={(e) => e.target.style.display='none'}/></div>}</div></div>
                                    <button type="submit" className="bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-xl text-lg shadow-xl shadow-blue-900/10 mt-2 hover:shadow-blue-600/20 transition-all active:scale-[0.98]">{editingId ? "保存修改" : "确认添加"}</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
